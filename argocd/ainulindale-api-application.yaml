apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ainulindale
  namespace: argocd
  labels:
    app.kubernetes.io/name: ainulindale
    app.kubernetes.io/part-of: ainulindale
spec:
  description: Ainulindale GitOps project
  sourceRepos:
    - https://github.com/dana/ainulindale-infra.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: ainulindale-api
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ainulindale-api
  namespace: argocd
  labels:
    app.kubernetes.io/name: ainulindale-api
    app.kubernetes.io/instance: ainulindale-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ainulindale
spec:
  project: ainulindale
  source:
    repoURL: https://github.com/dana/ainulindale-infra.git
    targetRevision: main
    path: apps/ainulindale-api/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: ainulindale-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
