name: Repository Baseline

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-baseline:
    name: repository-baseline
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify required repository baseline files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "README.md"
            "LICENSE"
            "CONTRIBUTING.md"
            ".gitignore"
            ".github/dependabot.yml"
            ".github/workflows/repository-baseline.yml"
            "docs/repository-settings.md"
          )

          for path in "${required_files[@]}"; do
            if [ ! -s "$path" ]; then
              echo "Missing or empty required file: $path"
              exit 1
            fi
          done

          echo "Repository baseline files are present."
