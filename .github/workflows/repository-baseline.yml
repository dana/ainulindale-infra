name: Repository Baseline

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-baseline:
    name: repository-baseline
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required repository baseline files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "README.md"
            "LICENSE"
            "CONTRIBUTING.md"
            ".gitignore"
            ".github/dependabot.yml"
            ".github/workflows/repository-baseline.yml"
            "docs/repository-settings.md"
          )

          for path in "${required_files[@]}"; do
            test -s "$path"
          done

      - name: Verify workflow trigger stays pull_request-only
        shell: bash
        run: |
          set -euo pipefail

          workflow=".github/workflows/repository-baseline.yml"

          grep -q '^on:' "$workflow"
          grep -q 'pull_request:' "$workflow"

          forbidden_triggers=(
            'pull_request_target:'
            'push:'
            'workflow_dispatch:'
            'workflow_run:'
          )

          for trigger in "${forbidden_triggers[@]}"; do
            if grep -q "$trigger" "$workflow"; then
              echo "Forbidden trigger found: $trigger"
              exit 1
            fi
          done
