name: Repository Baseline

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-baseline:
    name: repository-baseline
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required repository baseline files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "README.md"
            "LICENSE"
            "CONTRIBUTING.md"
            ".gitignore"
            ".github/dependabot.yml"
            ".github/workflows/repository-baseline.yml"
            "docs/repository-settings.md"
          )

          for path in "${required_files[@]}"; do
            test -s "$path"
          done

      - name: Verify workflow trigger stays pull_request-only
        shell: bash
        run: |
          set -euo pipefail

          workflow=".github/workflows/repository-baseline.yml"

          python3 - <<'PY'
from pathlib import Path
import sys

workflow = Path(".github/workflows/repository-baseline.yml")
text = workflow.read_text()

lines = text.splitlines()

# This intentionally performs a narrow textual check against the actual
# top-level trigger declaration instead of grepping arbitrary strings in
# the script body.
try:
    on_index = next(i for i, line in enumerate(lines) if line == "on:")
except StopIteration:
    print("Missing top-level 'on:' declaration")
    sys.exit(1)

trigger_lines = []
for line in lines[on_index + 1:]:
    if line and not line.startswith(" "):
        break
    if line.startswith("  ") and line.strip().endswith(":"):
        trigger_lines.append(line.strip())

allowed = {"pull_request:"}
actual = set(trigger_lines)

if actual != allowed:
    print(f"Expected only pull_request trigger; found: {sorted(actual)}")
    sys.exit(1)

print("Workflow trigger validation passed")
PY
